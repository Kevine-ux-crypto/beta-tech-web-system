<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compact Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2ecc71);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

.container {
    background: rgba(255, 255, 255, 0.96);
    padding: 22px;
    width: 300px; 
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}


h2 {
    text-align: center;
    color: #27ae60;
    margin-bottom: 18px;
    font-size: 22px;
}


.input-box {
    position: relative;
    margin-bottom: 18px;
}

.input-box input {
    width: 100%;
    padding: 10px 10px 10px 40px;  
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    background: #f9f9f9;
    outline: none;
}

.input-box label {
    position: absolute;
    left: 40px;
    top: 12px;
    font-size: 13px;
    color: #888;
    transition: 0.3s;
    pointer-events: none;
}


.input-box input:focus + label,
.input-box input:valid + label {
    top: -8px;
    font-size: 11px;
    background: white;
    padding: 0 4px;
    color: #27ae60;
}


.input-box i {
    position: absolute;
    left: 12px;
    top: 12px;
    color: #27ae60;
    font-size: 14px;
}

.toggle-pass {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
    color: #27ae60;
}


.options {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 10px;
}


button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: scale(1.02);
}


.error {
    color: red;
    font-size: 12px;
    display: none;
    text-align: center;
}


.footer {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
}

.footer a {
    color: #27ae60;
}
</style>

</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form onsubmit="return validateForm()">

        <div class="input-box">
            <input type="text" id="username" required>
            <label>Username</label>
            <i class="fa fa-user"></i>
        </div>

       
        <div class="input-box">
            <input type="password" id="password" required>
            <label>Password</label>
            <i class="fa fa-lock"></i>
            <i class="fa fa-eye toggle-pass" onclick="togglePassword()"></i>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember</label>
            <a href="#">Forgot?</a>
        </div>

        <p class="error" id="error">Fill all fields</p>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        No account? <a href="#">Register</a>
    </div>
</div>

<script>

function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function validateForm() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let error = document.getElementById("error");

    if (user === "" || pass === "") {
        error.style.display = "block";
        return false;
    }

    alert("Login successful!");
    return true;
}

</script>

</body>
</html>
